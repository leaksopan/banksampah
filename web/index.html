<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="banksampah">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>banksampah</title>
  <link rel="manifest" href="manifest.json">

  <!-- Include html2pdf.js from CDN for client-side PDF generation & downloading -->
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>

  <script>
    function downloadPdfFromHtml(title, htmlContent) {
      if (typeof html2pdf === 'undefined') {
        console.warn('html2pdf is not loaded yet! Retrying in 500ms...');
        setTimeout(function() {
          downloadPdfFromHtml(title, htmlContent);
        }, 500);
        return;
      }

      // 1. Create a beautiful full-screen loading overlay (z-index: 999999)
      const overlay = document.createElement('div');
      overlay.style.position = 'fixed';
      overlay.style.top = '0';
      overlay.style.left = '0';
      overlay.style.width = '100vw';
      overlay.style.height = '100vh';
      overlay.style.background = '#ffffff'; // opaque white to completely cover the Flutter app
      overlay.style.zIndex = '999999';
      overlay.style.display = 'flex';
      overlay.style.flexDirection = 'column';
      overlay.style.justifyContent = 'center';
      overlay.style.alignItems = 'center';
      overlay.style.fontFamily = "'Segoe UI', Arial, sans-serif";

      overlay.innerHTML = `
        <div style="
          width: 50px;
          height: 50px;
          border: 5px solid #E8F5E9;
          border-top: 5px solid #2E7D32;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        "></div>
        <p style="
          margin-top: 20px;
          font-size: 16px;
          font-weight: bold;
          color: #2E7D32;
          letter-spacing: 0.5px;
          margin-bottom: 5px;
        ">Menyiapkan Laporan PDF...</p>
        <p style="
          font-size: 12px;
          color: #666;
          margin: 0;
        ">Laporan akan otomatis terunduh sebentar lagi.</p>
        <style>
          @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }
        </style>
      `;
      document.body.appendChild(overlay);

      // 2. Create the printable element (placed underneath the loading overlay visually, but in the viewport)
      const element = document.createElement('div');
      element.style.position = 'fixed';
      element.style.left = '0';
      element.style.top = '0';
      element.style.width = '790px'; // standard A4 page width reference
      element.style.zIndex = '999998'; // just behind the loading overlay
      element.style.background = '#ffffff';
      element.style.opacity = '1';
      element.style.padding = '20px';
      
      // Inject standard printable styles so they render beautifully in html2pdf
      const style = `
        <style>
          body, div, table {
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #000;
            background-color: #fff;
            font-size: 13px;
            line-height: 1.4;
          }
          .header {
            text-align: center;
            margin-bottom: 20px;
          }
          .header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
          }
          .header p {
            margin: 4px 0 0 0;
            font-size: 12px;
          }
          .divider {
            border-top: 1px solid #000;
            margin: 15px 0;
          }
          .divider-dashed {
            border-top: 1px dashed #000;
            margin: 15px 0;
          }
          table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
          }
          th, td {
            padding: 6px 4px;
            text-align: left;
            vertical-align: top;
          }
          th {
            border-bottom: 1px solid #000;
            border-top: 1px solid #000;
            font-weight: bold;
          }
          .text-right {
            text-align: right;
          }
          .text-center {
            text-align: center;
          }
          .font-bold {
            font-weight: bold;
          }
          .total-row {
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
            font-weight: bold;
          }
          .signature-section {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
          }
          .signature-box {
            text-align: center;
            width: 45%;
          }
          .signature-space {
            height: 60px;
          }
          .signature-line {
            border-top: 1px solid #000;
            margin-top: 5px;
          }
        </style>
      `;
      
      element.innerHTML = style + htmlContent;
      document.body.appendChild(element); // Append to DOM so html2canvas can measure layout and paint
      
      const opt = {
        margin:       15,
        filename:     title + '.pdf',
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { 
          scale: 2, 
          useCORS: true, 
          logging: false,
          scrollX: 0,
          scrollY: 0,
          windowWidth: 790
        },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };
      
      // Generate the PDF and automatically download it to the browser's download folder
      html2pdf().set(opt).from(element).save().then(function() {
        // Cleanup after download completes
        document.body.removeChild(element);
        document.body.removeChild(overlay);
      }).catch(function(error) {
        console.error('html2pdf generation error:', error);
        // Cleanup on error
        document.body.removeChild(element);
        document.body.removeChild(overlay);
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
